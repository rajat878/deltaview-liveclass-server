<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DeltaView Live Class</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #0f172a; color: #f1f5f9; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; }
    .screen { width: 100%; display: flex; align-items: center; justify-content: center; }
    .hidden { display: none !important; }
    .card { background: #1e293b; border-radius: 16px; padding: 36px 28px;
            max-width: 400px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
    .logo { font-size: 2rem; font-weight: 800; color: #6366f1; margin-bottom: 8px; }
    h1 { font-size: 1.3rem; margin-bottom: 6px; }
    h2 { font-size: 1.2rem; margin-bottom: 8px; }
    .subtitle { color: #94a3b8; font-size: .9rem; margin-bottom: 24px; }
    input { width: 100%; padding: 12px 16px; margin-bottom: 12px; border-radius: 10px;
            border: 1.5px solid #334155; background: #0f172a; color: #f1f5f9;
            font-size: 1.1rem; text-align: center; letter-spacing: 3px; outline: none; }
    input:focus { border-color: #6366f1; }
    input#name-input { letter-spacing: normal; font-size: .95rem; }
    button { width: 100%; padding: 13px; border-radius: 10px; border: none;
             background: #6366f1; color: #fff; font-size: 1rem; font-weight: 600;
             cursor: pointer; transition: background .2s; }
    button:hover { background: #4f46e5; }
    .error { color: #f87171; font-size: .88rem; margin-top: 10px; }
    .spinner { width: 48px; height: 48px; border: 4px solid #334155;
               border-top-color: #6366f1; border-radius: 50%;
               animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #live-screen { flex-direction: column; padding: 0; background: #000;
                   min-height: 100vh; align-items: stretch; }
    .live-bar { display: flex; align-items: center; gap: 8px; padding: 8px 14px;
                background: rgba(0,0,0,.6); position: fixed; top: 0; left: 0; right: 0; z-index: 10; }
    .live-dot { width: 10px; height: 10px; border-radius: 50%; background: #ef4444;
                animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .spacer { flex: 1; }
    .live-bar button { width: auto; padding: 6px 14px; font-size: .8rem; background: #334155; }
    #mic-btn.mic-on { background: #16a34a; }
    #mic-btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    #raise-hand-btn.hand-active { background: #f59e0b; color: #1e293b; }
    #confused-btn.confused-active { background: #dc2626; }
    #remote-video { width: 100%; height: 100vh; object-fit: contain; display: block; }
    #cam-btn.cam-on { background: #16a34a; }
    #cam-btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

    /* ── Camera conferencing tiles ───────────────────────────────────── */
    /* Teacher's own webcam, shown as a small bubble over the shared screen. */
    #teacher-cam-video { position: fixed; top: 90px; right: 12px; width: 96px; height: 128px;
                          border-radius: 12px; object-fit: cover; z-index: 8;
                          border: 2px solid #6366f1; background: #000;
                          box-shadow: 0 6px 20px rgba(0,0,0,.5); }
    /* This student's own camera preview (only visible to themselves), lower-left. */
    #local-cam-preview { position: fixed; bottom: 16px; left: 12px; width: 84px; height: 112px;
                          border-radius: 12px; object-fit: cover; z-index: 8;
                          border: 2px solid #16a34a; background: #000; transform: scaleX(-1);
                          box-shadow: 0 6px 20px rgba(0,0,0,.5); }
    #status-banner { position: fixed; top: 44px; left: 0; right: 0; z-index: 9;
                      text-align: center; font-size: .85rem; padding: 8px 12px;
                      transform: translateY(-120%); transition: transform .25s ease;
                      background: #334155; color: #f1f5f9; }
    #status-banner.show { transform: translateY(0); }
    #status-banner.granted { background: #16a34a; }
    #status-banner.revoked { background: #7f1d1d; }

    /* ── Confusion area-select overlay ──────────────────────────────── */
    #confusion-overlay { position: fixed; inset: 0; z-index: 20; touch-action: none;
                          background: rgba(15,23,42,.25); display: none; }
    #confusion-overlay.active { display: block; }
    #confusion-hint { position: fixed; top: 44px; left: 0; right: 0; z-index: 21;
                       text-align: center; font-size: .85rem; padding: 10px 16px;
                       background: rgba(15,23,42,.85); color: #f1f5f9; }
    #confusion-box { position: absolute; border: 2px solid #ef4444;
                      background: rgba(239,68,68,.22); border-radius: 6px;
                      box-shadow: 0 0 0 9999px rgba(15,23,42,.35);
                      display: none; }
    #confusion-box.show { display: block; }
    #confusion-box .handle { position: absolute; width: 20px; height: 20px;
                              right: -10px; bottom: -10px; border-radius: 50%;
                              background: #ef4444; border: 2px solid #fff; }
    #confusion-actions { position: fixed; left: 0; right: 0; bottom: 24px; z-index: 21;
                          display: none; justify-content: center; gap: 12px; padding: 0 20px; }
    #confusion-actions.show { display: flex; }
    #confusion-actions button { width: auto; padding: 12px 22px; font-size: .95rem; }
    #confusion-send-btn { background: #ef4444; }
    #confusion-send-btn:hover { background: #dc2626; }
    #confusion-cancel-btn { background: #334155; }
  </style>
</head>
<body>

<div id="join-screen" class="screen">
  <div class="card">
    <div class="logo">📡 Live</div>
    <h1>DeltaView Live Class</h1>
    <p class="subtitle">Enter the room code shown on your teacher's screen</p>
    <!-- FIX: maxlength=6 to match the 6-char room code the server generates -->
    <input id="pin-input" type="text" maxlength="6" placeholder="ROOM CODE"
           autocomplete="off" style="text-transform:uppercase" />
    <input id="name-input" type="text" maxlength="24" placeholder="Your name (optional)"
           autocomplete="off" />
    <button id="join-btn">Join Class</button>
    <p id="join-error" class="error hidden"></p>
  </div>
</div>

<div id="waiting-screen" class="screen hidden">
  <div class="card">
    <div class="spinner"></div>
    <h2>Connecting…</h2>
    <p class="subtitle">Waiting for teacher's screen — please wait</p>
  </div>
</div>

<div id="live-screen" class="screen hidden">
  <div class="live-bar">
    <span class="live-dot"></span>
    <span>LIVE</span>
    <span class="spacer"></span>
    <button id="confused-btn">❓ Confused</button>
    <button id="raise-hand-btn">✋ Raise hand</button>
    <button id="mic-btn" disabled>🔒 Mic locked</button>
    <button id="cam-btn" disabled>🔒 Camera locked</button>
    <button id="fullscreen-btn">⛶ Fullscreen</button>
  </div>
  <div id="status-banner"></div>
  <video id="remote-video" autoplay playsinline></video>
  <video id="teacher-cam-video" autoplay playsinline class="hidden"></video>
  <video id="local-cam-preview" autoplay playsinline muted class="hidden"></video>

  <!-- Tap-and-drag over the teacher's screen to mark exactly where you're
       confused. Sits above the video; only active while marking. -->
  <div id="confusion-overlay">
    <div id="confusion-hint">Drag over the exact spot you're confused about, then tap Send</div>
    <div id="confusion-box"><div class="handle"></div></div>
  </div>
  <div id="confusion-actions">
    <button id="confusion-send-btn">📍 Send</button>
    <button id="confusion-cancel-btn">Cancel</button>
  </div>
</div>

<div id="ended-screen" class="screen hidden">
  <div class="card">
    <div class="logo">🔴 Ended</div>
    <h2>Session Ended</h2>
    <p class="subtitle">The teacher has ended this live class.</p>
    <button id="rejoin-btn">Join Again</button>
  </div>
</div>

<!-- Socket.IO client served by our own server — no hardcoded URL needed -->
<script src="/socket.io/socket.io.js"></script>
<script src="student.js"></script>
</body>
</html>
