<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DeltaView Live Class</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #0f172a; color: #f1f5f9; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; }
    .screen { width: 100%; display: flex; align-items: center; justify-content: center; }
    .hidden { display: none !important; }
    .card { background: #1e293b; border-radius: 16px; padding: 36px 28px;
            max-width: 400px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
    .logo { font-size: 2rem; font-weight: 800; color: #6366f1; margin-bottom: 8px; }
    h1 { font-size: 1.3rem; margin-bottom: 6px; }
    h2 { font-size: 1.2rem; margin-bottom: 8px; }
    .subtitle { color: #94a3b8; font-size: .9rem; margin-bottom: 24px; }
    input { width: 100%; padding: 12px 16px; margin-bottom: 12px; border-radius: 10px;
            border: 1.5px solid #334155; background: #0f172a; color: #f1f5f9;
            font-size: 1.1rem; text-align: center; letter-spacing: 3px; outline: none; }
    input:focus { border-color: #6366f1; }
    input#name-input { letter-spacing: normal; font-size: .95rem; }
    button { width: 100%; padding: 13px; border-radius: 10px; border: none;
             background: #6366f1; color: #fff; font-size: 1rem; font-weight: 600;
             cursor: pointer; transition: background .2s; }
    button:hover { background: #4f46e5; }
    .error { color: #f87171; font-size: .88rem; margin-top: 10px; }
    .spinner { width: 48px; height: 48px; border: 4px solid #334155;
               border-top-color: #6366f1; border-radius: 50%;
               animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Live screen ── */
    #live-screen { flex-direction: column; padding: 0; background: #000;
                   min-height: 100vh; align-items: stretch; }
    .live-bar { display: flex; align-items: center; gap: 8px; padding: 8px 14px;
                background: rgba(0,0,0,.6); position: fixed; top: 0; left: 0; right: 0; z-index: 10; }
    .live-dot { width: 10px; height: 10px; border-radius: 50%; background: #ef4444;
                animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .spacer { flex: 1; }
    .live-bar button { width: auto; padding: 6px 14px; font-size: .8rem; background: #334155; }
    #remote-video { width: 100%; height: 100vh; object-fit: contain; display: block; }

    /* Recording indicator in the live bar */
    #rec-indicator { display: flex; align-items: center; gap: 5px;
                     font-size: .75rem; color: #fca5a5; }
    #rec-indicator .rec-dot { width: 8px; height: 8px; border-radius: 50%;
                               background: #ef4444;
                               animation: pulse 1s ease-in-out infinite; }

    /* ── Ended screen download area ── */
    #download-btn {
      display: block; width: 100%; padding: 14px; margin-top: 16px;
      border-radius: 10px; background: #16a34a; color: #fff;
      font-size: 1rem; font-weight: 600; text-decoration: none;
      transition: background .2s;
    }
    #download-btn:hover { background: #15803d; }
    #download-size {
      color: #94a3b8; font-size: .82rem; margin-top: 8px;
    }
  </style>
</head>
<body>

<div id="join-screen" class="screen">
  <div class="card">
    <div class="logo">📡 Live</div>
    <h1>DeltaView Live Class</h1>
    <p class="subtitle">Enter the room code shown on your teacher's screen</p>
    <input id="pin-input" type="text" maxlength="6" placeholder="ROOM CODE"
           autocomplete="off" style="text-transform:uppercase" />
    <input id="name-input" type="text" maxlength="24" placeholder="Your name (required)"
           autocomplete="off" />
    <button id="join-btn">Join Class</button>
    <p id="join-error" class="error hidden"></p>
  </div>
</div>

<div id="waiting-screen" class="screen hidden">
  <div class="card">
    <div class="spinner"></div>
    <h2>Connecting…</h2>
    <p class="subtitle">Waiting for teacher's screen — please wait</p>
  </div>
</div>

<div id="live-screen" class="screen hidden">
  <div class="live-bar">
    <span class="live-dot"></span>
    <span>LIVE</span>
    <!-- Recording indicator — shown once MediaRecorder starts -->
    <span id="rec-indicator" class="hidden">
      <span class="rec-dot"></span>REC
    </span>
    <span class="spacer"></span>
    <button id="fullscreen-btn">⛶ Fullscreen</button>
  </div>
  <video id="remote-video" autoplay playsinline></video>
</div>

<div id="ended-screen" class="screen hidden">
  <div class="card">
    <div class="logo">🔴 Ended</div>
    <h2>Session Ended</h2>
    <p class="subtitle">The teacher has ended this live class.</p>

    <!-- Download button — hidden until recording is ready -->
    <a id="download-btn" class="hidden">⬇ Download Class Recording</a>
    <p id="download-size" class="hidden"></p>

    <button id="rejoin-btn" style="margin-top:16px;">Join Again</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="student.js"></script>
</body>
</html>
